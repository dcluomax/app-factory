server {
    listen 80;
    server_name quickshrink.orthogonal.info;
    root /usr/share/nginx/html/quickshrink;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
}

server {
    listen 80;
    server_name pixelstrip.orthogonal.info;
    root /usr/share/nginx/html/pixelstrip;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
}

server {
    listen 80;
    server_name typefast.orthogonal.info;
    root /usr/share/nginx/html/typefast;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
}

server {
    listen 80;
    server_name _;
    
    location /quickshrink/ {
        alias /usr/share/nginx/html/quickshrink/;
        try_files $uri $uri/ /quickshrink/index.html;
    }
    location /pixelstrip/ {
        alias /usr/share/nginx/html/pixelstrip/;
        try_files $uri $uri/ /pixelstrip/index.html;
    }
    location /typefast/ {
        alias /usr/share/nginx/html/typefast/;
        try_files $uri $uri/ /typefast/index.html;
    }
    
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location ~* \.(js|css|png|jpg|ico|svg|json)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
