services:
  webapps:
    image: nginx:alpine
    container_name: webapps
    restart: unless-stopped
    ports:
      - "8890:80"
    volumes:
      - ./quickshrink:/usr/share/nginx/html/quickshrink:ro
      - ./pixelstrip:/usr/share/nginx/html/pixelstrip:ro
      - ./typefast:/usr/share/nginx/html/typefast:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
